<!DOCTYPE html>
<html lang="en">
    <script src="script.js"></script>

<head>
    <meta charset="UTF-8">
    <title>LIFELINE HUB</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #b30000;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #2d0080;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            padding: 20px;
            background: white;
            margin: 20px;
            border-radius: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            background-color: #00b32d;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #800000;
        }

        footer {
            text-align: center;
            background-color: #b30000;
            color: white;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>🩸LIFELINE HUB</h1>
    <p>Donate Blood, Save Lives</p>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#register">Donor Register</a>
    <a href="#search">Search Blood</a>
    <a href="#emergency">Emergency</a>
</nav>

<section id="home">
    <h2>Welcome to LifeSaver Blood Bank</h2>
    <p>This platform connects blood donors with patients in need.</p>
</section>

<section id="register">
    <h2>Donor Registration</h2>
    <form action="http://localhost:5000/register" method="POST">
        <label>Full Name:</label>
        <input type="text" name="name" placeholder="Enter your name" required>

        <label>Blood Group:</label>
        <select name="bloodGroup" required>
            <option value="">Select</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>O+</option>
            <option>O-</option>
            <option>AB+</option>
            <option>AB-</option>
        </select>

        <label>Phone Number:</label>
        <input type="tel" name="phone" placeholder="Enter phone number" required>

        <label>City:</label>
        <input type="text" name="city" placeholder="Enter city" required>

        <button type="submit">Register</button>
    </form>
</section>

<section id="search">
    <h2>Search Blood</h2>
    <form action="/search" method="POST">
        <label>Select Blood Group:</label>
        <select name="bloodGroup" required>
            <option value="">Select</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>O+</option>
            <option>O-</option>
            <option>AB+</option>
            <option>AB-</option>
        </select>

        <label>City:</label>
        <input type="text" name="city" placeholder="Enter city" required>

        <button type="submit">Search</button>
    </form>
</section>

<section id="emergency">
    <h2>Emergency Request</h2>
    <form action="/emergency" method="POST">
        <label>Patient Name:</label>
        <input type="text" name="patientName" required>

        <label>Required Blood Group:</label>
        <select name="bloodGroup" required>
            <option value="">Select</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>O+</option>
            <option>O-</option>
            <option>AB+</option>
            <option>AB-</option>
        </select>

        <label>Hospital Name:</label>
        <input type="text" name="hospitalName" required>

        <label>Contact Number:</label>
        <input type="tel" name="contactNumber" required>

        <button type="submit">Send Emergency Request</button>
    </form>
</section>

<footer>
    <p>© 2026 Lifeline Hub | All Rights Reserved</p>
</footer>
<script src="script.js"></script>


</body>
</html>
